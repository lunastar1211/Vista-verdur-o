<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vista Verdurão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-login">
    <div class="container-login">
        <!-- Lado esquerdo -->
        <div class="lado-esquerdo" style="background-image: url('assets/img/catedral.jpg');">
            <div class="conteudo-esquerdo">
                <div class="logo-titulo">
                    <img src="assets/img/logo.jpg" alt="Logo" class="logo-login">
                    <h1>Vista Verdurão</h1>
                </div>
                <div class="texto-slogan">
                    <p class="slogan">Dados frescos, Decisões inteligentes.</p>
                    <p class="subtitulo">Acompanhe seu negócio com clareza e eficiência</p>
                </div>
            </div>
        </div>

        <!-- Lado direito -->
        <div class="lado-direito" style="background-image: url('assets/img/fundologin.jpg');">
            <div class="formulario-login">
                <h2>Bem-vindo(a)!</h2>
                <p>Faça login para acessar sua conta</p>
                <form id="formLogin" action="dashboard.html" method="get">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required value="admin@vistaverdurao.com">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="***********" required>

                    <a href="#" class="link-esqueci">Esqueci minha senha</a>

                    <button type="submit" class="botao-entrar">Entrar</button>

                    <div class="divisor">OU</div>

                    <button type="button" class="botao-google">
                        <img src="assets/icons/google.png" alt="Google" class="google-icon">
                        Entrar com Google
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
