<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Configurações | Vista Verdurão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar-placeholder"></div>

        <main class="conteudo-principal">
            <div class="topo-placeholder"></div>

            <div class="config-wrapper">
                <div class="config-container">
                    <div class="perfil-admin">
                        <h2>Administrador</h2>
                        <p class="email-admin">admin@vistaverdurao.com</p>
                        <button class="botao-sair" onclick="window.location.href='login.html'">Sair do sistema →</button>
                    </div>
                    <div class="opcoes-gerais">
                        <h3>Preferências</h3>
                        <label><input type="checkbox"> Notificações por email</label>
                        <label><input type="checkbox"> Modo escuro</label>
                        <button class="salvar-config">Salvar alterações</button>
                    </div>
                </div>
            </div>

            <div class="rodape-placeholder"></div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
